[build]
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
  "-C","target-feature=+crt-static",   # static C runtime
  "-C","link-arg=-static",             # ensure static link
  "-C","strip=symbols"                 # or set in Cargo.toml profile
]
